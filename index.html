<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🍪 Who Stole the Cookies?</title>
<script src="https://cdn.jsdelivr.net/npm/tracery-grammar@0.1.1/tracery.min.js"></script>
<style>
body { font-family: sans-serif; background: #fefae0; text-align: center; padding: 2em; color: #333; }
#blob { margin: 2em auto; font-size: 1.2em; width: 75%; min-height: 80px; white-space: pre-wrap; }
button { background: #f4a261; color: white; border: none; border-radius: 8px; padding: 16px 32px; font-size: 18px; cursor: pointer; }
button:hover { background: #e76f51; }
</style>
</head>
<body>
<h2>🍪 Who Stole the Cookies?</h2>
<div id="blob">Click the button!</div>
<button id="generateBtn">Reveal the Culprit</button>

<script>
const grammarObj = {
  origin: ["#suspect# stole the cookies because #reason#."],
  suspect: ["Alice","Bob","Charlie","Diana","Eve"],
  reason: ["they love cookies","they were hungry","they were sneaky","they had a sweet tooth"]
};
const grammar = tracery.createGrammar(grammarObj);

document.getElementById("generateBtn").addEventListener("click", () => {
  document.getElementById("blob").innerText = grammar.flatten("#origin#");
});
</script>
</body>
</html>
