<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🍪 Who Stole the Cookies?</title>

<style>
  body { font-family: sans-serif; background: #fefae0; color: #333; padding: 2em; text-align: center; }
  h2 { margin-bottom: 20px; color: dimgray; }
  #blob { margin: 2em auto; font-size: 1.2em; width: 75%; min-height: 80px; white-space: pre-wrap; }
  button { background: #f4a261; border: none; border-radius: 8px; color: white; padding: 16px 32px; font-size: 18px; cursor: pointer; margin-top: 16px; transition-duration: 0.4s; }
  button:hover { background-color: #e76f51; }
  button:disabled { background-color: #ccc; cursor: not-allowed; }
</style>

<!-- Tracery CDN - using a more reliable CDN -->
<script src="https://unpkg.com/tracery-grammar@2.7.4/build/tracery.min.js"></script>
</head>
<body>

<h2>🍪 Who Stole the Cookies from the Cookie Jar?</h2>
<div id="blob">Loading...</div>
<button id="generateBtn">Reveal the Culprit</button>

<script>
  // Function to initialize the generator
  function initGenerator() {
    // Check if tracery is available
    if (typeof tracery === 'undefined') {
      document.getElementById('blob').innerText = '⚠️ Error: Tracery library failed to load. Please refresh the page.';
      return false;
    }

    const grammarObj = {
      origin: [
        "[thief:#suspect#]👀 Who stole the cookies from the cookie jar?\n#thief#!\n🍪 #thief# stole the cookies from the cookie jar!\n#reason#",
        "[thief:#suspect#]🔍 I suspect #thief#...\nWhy? Because #reason#.",
        "[thief:#suspect#]🚨 The cookies are gone! And #thief# was acting mighty suspicious.\n#reason#",
        "[thief:#suspect#]🕵️ Detective Mode: Activated.\nPrimary suspect: #thief#.\nCase evidence: #reason#."
      ],
      suspect: ["Alice","Bob","Charlie","Diana","Eve","Frank","Greta","Hank","Ivy"],
      reason: [
        "They had crumbs all over their face.",
        "They were spotted near the jar moments before the cookies vanished.",
        "They have a notorious sweet tooth.",
        "They were holding an empty napkin and whistling.",
        "They ran away when asked about cookies.",
        "They were the last one in the kitchen.",
        "They smelled suspiciously like chocolate chips."
      ]
    };

    try {
      const grammar = tracery.createGrammar(grammarObj);
      
      const generateBtn = document.getElementById("generateBtn");
      const blobElement = document.getElementById("blob");
      
      // Enable the button
      generateBtn.disabled = false;
      
      // Generate initial text
      blobElement.innerText = grammar.flatten("#origin#");
      
      // Add click handler
      generateBtn.addEventListener("click", () => {
        blobElement.innerText = grammar.flatten("#origin#");
      });
      
      return true;
    } catch (error) {
      document.getElementById('blob').innerText = '⚠️ Error: Failed to create grammar. Please refresh the page.';
      console.error('Grammar creation error:', error);
      return false;
    }
  }

  // Wait for both DOM and scripts to load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      // Small delay to ensure script is fully loaded
      setTimeout(initGenerator, 100);
    });
  } else {
    // DOM is already loaded
    setTimeout(initGenerator, 100);
  }

  // Fallback: if tracery still doesn't load after 2 seconds, show error
  setTimeout(() => {
    if (typeof tracery === 'undefined') {
      document.getElementById('blob').innerText = '⚠️ Error: Tracery library failed to load. Please check your internet connection and refresh.';
      document.getElementById('generateBtn').disabled = true;
    }
  }, 2000);
</script>

<noscript>
  <div style="color: red; margin-top: 20px;">JavaScript is required for this page to work properly.</div>
</noscript>

</body>
</html>
