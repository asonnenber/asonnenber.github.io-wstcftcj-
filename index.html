<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🍪 Who Stole the Cookies from the Cookie Jar?</title>
<style>
body {
    font-family: sans-serif;
    background: #fefae0;
    color: #333;
    padding: 32px;
    text-align: center;
  }

  /* Header */
  h2 {
    color: dimgray;
    text-align: center;
    margin-bottom: 20px;
    font-size: 3em; /* big header */
  }

  /* Procedural text */
  #blob {
    width: 75%;
    margin: auto;
    font-size: 2em; /* bigger body text */
    min-height: 100px;
    white-space: pre-wrap;
  }

  /* Button */
  button {
    background: #f4a261;
    border: none;
    border-radius: 8px;
    color: white;
    padding: 16px 32px;
    font-size: 1.5em;
    cursor: pointer;
    margin-top: 24px;
    transition-duration: 0.4s;
  }

  button:hover {
    background-color: #e76f51;
  }
</style>
</head>
<body>

<h2>🍪 Who Stole the Cookies from the Cookie Jar?</h2>
<div id="blob">Click the button below to investigate…</div>
<button id="generateBtn">Reveal the Culprit</button>

<script>
const suspects = ["Alice","Bob","Charlie","Diana","Eve","Frank","Greta","Hank","Ivy"];
const reasons = [
  "They had crumbs all over their face.",
  "They were seen near the jar before the cookies vanished.",
  "They have a notorious sweet tooth.",
  "They were holding an empty napkin and whistling."
];

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const thief = randomItem(suspects);
  const reason = randomItem(reasons);
  const messages = [
    `👀 Who stole the cookies from the cookie jar?\n${thief}!\n🍪 ${thief} stole the cookies from the cookie jar!\n${reason}`,
    `🔍 I suspect ${thief}...\nWhy? Because ${reason}.`,
    `🚨 The cookies are gone! And ${thief} was acting suspicious.\n${reason}`
  ];
  document.getElementById("blob").innerText = randomItem(messages);
}

// Only generate when button is clicked
document.getElementById("generateBtn").addEventListener("click", generate);
</script>

</body>
</html>
