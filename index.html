<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🍪 Who Stole the Cookies from the Cookie Jar?</title>
<style>
/* === Body & Layout === */
body {
    font-family: sans-serif;
    background: #fefae0;
    color: #333;
    padding: 32px;
    margin: 0;
    display: flex;
    justify-content: center;
    min-height: 100vh; /* full viewport height */
    text-align: center;
}

/* === Container for header, text, button === */
.generator-container {
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* header top, button bottom, blob in middle */
    align-items: center;
    height: 400px;   /* total vertical space */
    width: 80%;      /* optional width */
}

/* === Header === */
h2 {
    color: dimgray;
    font-size: 3em;
    margin: 0;
}

/* === Procedural text / message === */
#blob {
    display: flex;
    align-items: center;      /* vertical centering in space */
    font-size: 2em;
    min-height: 50px;
    max-height: 200px;        /* prevents button from moving on long messages */
    width: 100%;
    text-align: center;
    padding: 10px;
    box-sizing: border-box;
}

/* === Button === */
button {
    background: #f4a261;
    border: none;
    border-radius: 8px;
    color: white;
    padding: 32px 64px;
    font-size: 1.5em;
    cursor: pointer;
    margin-top: 0;
    transition-duration: 0.4s;
}

button:hover {
    background-color: #e76f51;
}

/* Optional: scrollbar styling for long messages */
#blob::-webkit-scrollbar {
    width: 8px;
}

#blob::-webkit-scrollbar-thumb {
    background-color: #f4a261;
    border-radius: 4px;
}
</style>
</head>
<body>

<div class="generator-container">
    <h2>🍪 Who Stole the Cookies from the Cookie Jar?</h2>
    <div id="blob">Click the button below to investigate…</div>
    <button id="generateBtn">Reveal the Culprit!</button>
</div>

<script>
const suspects = ["Atlas","Sam","PB","Adeline","Christine","Andrea","Abhik","Irish","Sandra","Fourth","Zahra","Ting","Aysha","Ralph","Roya","Tanvia","Marissa","Mira","Ellie","Layla"];
const reasons = [
  "They had crumbs all over their face.",
  "They were spotted near the cookie jar at noon.",
  "They have a notorious sweet tooth and can NEVER resist.",
  "They just look so guilty.",
  "They ran away when someone asked about cookies. That's gotta mean something.",
  "They were the last one in the kitchen and acted suspicious.",
  "They smelled suspiciously like chocolate chips.",
  "They were humming the cookie theme song while tiptoeing.",
  "They were seen licking their fingers near the cookie jar. Nom nom nom."
];

const messages = [
  "👀 Who stole the cookies from the cookie jar?\nTHIEF!\n🍪 THIEF definitely took the cookies!\nREASON",
  "🔍 I suspect THIEF...\nWhy? Because REASON",
  "🚨 Emergency! The cookies are gone! THIEF was acting suspicious.\nREASON",
  "🕵️ Detective Mode: Activated.\nPrimary suspect: THIEF.\nEvidence: REASON",
  "👁️ Observations suggest THIEF is guilty.\nDetails: REASON",
  "🤔 My instincts point to THIEF...\nReason: REASON",
  "💥 Alert! Cookie heist in progress. THIEF seems to be the culprit!\nREASON",
  "🍪 The cookie jar is empty and THIEF is the prime suspect.\nREASON",
  "📢 Witnesses report seeing THIEF near the cookies.\nWhy suspicious? REASON"
];

function randomItem(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const thief = randomItem(suspects);
  const reason = randomItem(reasons);
  const template = randomItem(messages);

  const message = template.replace(/THIEF/g, thief).replace(/REASON/g, reason);

  document.getElementById("blob").innerText = message;
}

document.getElementById("generateBtn").addEventListener("click", generate);
</script>

</body>
</html>
